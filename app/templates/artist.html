{% extends 'base.html' %}

{% block title %}Artists{% endblock %}

{% block content %}

<div class="back-button-container">

    <a href="{{ url_for('main.regions') }}" class="back-button">

        ← Back to Regions

    </a>

</div>

<section class="page">

    <h2>{{ region }} Artists</h2>

    <p>Select an artist to view detailed information.</p>

    <div class="song-grid">

        {% for artist in artists %}

        <div class="song-card">

            <a href="{{ url_for('main.artist_detail', artist_id=artist.id) }}">

                {{ artist.name }}

            </a>

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
