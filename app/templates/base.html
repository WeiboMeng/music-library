<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}Music Library{% endblock %} | Music Library
    </title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon/music_library.jpg') }}">
</head>

<body>

<header>
    <nav class="navbar">

        <div class="nav-left">
            <a class="logo" href="{{ url_for('main.index') }}">
                🎵 Music Library
            </a>
        </div>

        <div class="nav-right">
            <a href="{{ url_for('main.index') }}">Home</a>
            <a href="{{ url_for('songs.song') }}">Songs</a>
            <a href="{{ url_for('main.regions') }}">Artists</a>
            <a href="{{ url_for('ranking.rank') }}">Ranking</a>

            {% if session.get('user') %}
                <span class="welcome-text">
                    Welcome, {{ session['user'] }}
                </span>

                <a href="{{ url_for('auth.logout') }}">Log Out</a>
            {% else %}
                <a href="{{ url_for('auth.login') }}">Log In</a>
            {% endif %}
        </div>

    </nav>
</header>

<main class="container">

    {% block content %}
    <p>Welcome to the Music Library.</p>
    {% endblock %}

</main>

<footer>

    <p>
        © 2026 Music Library Portfolio Project
    </p>

</footer>

</body>

</html>
