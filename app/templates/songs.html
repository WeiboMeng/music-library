{% extends 'base.html' %}

{% block title %}Songs{% endblock %}

{% block content %}

<section class="page">

    <h2>Browse Songs</h2>

    <p>
        Select a letter range to browse the available songs.
    </p>

    <div class="song-filter">

        {% for range in ranges %}
            <a href="{{ url_for('songs.select_songs', range=range) }}">
                {{ range }}
            </a>
        {% endfor %}

    </div>

</section>
