{% extends 'base.html' %}

{% block content %}
<div class="back-button-container">
    <a href="{{ url_for('songs.song') }}" class="back-button">Back to Songs</a>
</div>

<div>
    <h2 class="page">Songs in Range: {{ range }}</h2>
    <ul class="container">
        {% for song in songs %}
        <li>
            <a href="{{ url_for('songs.song_detail', song_id=song.id) }}">{{ song.title }}</a>
        </li>        
        {% endfor %}
    </ul>
</div>
{% endblock %}
